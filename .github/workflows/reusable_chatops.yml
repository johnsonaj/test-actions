on:
  workflow_call:
    inputs:
      chat_command:
        description: The command prefix to look for in the comment
        required: true
        type: string
      comment:
        description: The comment body to check
        required: true
        type: string
      username:
        description: The username who made the comment
        required: true
        type: string
      issue_number:
        description: The issue or PR number to comment on
        required: true
        type: number
      team_name:
        description: GitHub team slug to pull maintainers from
        required: true
        type: string
    secrets:
      token:
        required: true
      app_id:
        required: true
      app_key:
        required: true

jobs:
  chatops:
    runs-on: ubuntu-latest
    steps:
      - name: Get app token
        if: startsWith(inputs.comment, inputs.chat_command)
        id: app_token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.app_key }}

      - name: Check if user is a team member
        if: startsWith(inputs.comment, inputs.chat_command)
        id: check_maintainer
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          members=$(gh api \
            --paginate \
            "/orgs/${{ github.repository_owner }}/teams/${{ inputs.team_name }}/members" \
            --jq '[.[].login]' | jq -cs 'add // []')
          is_member=$(echo "$members" | jq -r --arg user "${{ inputs.username }}" 'any(.[]; . == $user)')
          echo "is_maintainer=${is_member}" >> "$GITHUB_OUTPUT"

      - name: Add ci-approved-maintainer label
        if: startsWith(inputs.comment, inputs.chat_command) && steps.check_maintainer.outputs.is_maintainer == 'true'
        id: add_maintainer_label
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        shell: bash
        run: |
          gh pr edit "${{ inputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --add-label "ci-approved-maintainer"

      # can be removed in the future if desired. Used to post command output for confirmation
      - name: Extract command remainder
        if: startsWith(inputs.comment, inputs.chat_command) && steps.check_maintainer.outputs.is_maintainer == 'true'
        id: extract_command
        shell: bash
        run: |
          comment="${{ inputs.comment }}"
          prefix="${{ inputs.chat_command }}"
          remainder="${comment#"$prefix"}"
          remainder="${remainder#"${remainder%%[![:space:]]*}"}"
          echo "remainder=${remainder}" >> "$GITHUB_OUTPUT"

      - name: Execute command
        if: startsWith(inputs.comment, inputs.chat_command) && steps.check_maintainer.outputs.is_maintainer == 'true'
        env:
          GH_TOKEN: ${{ secrets.token }}
        shell: bash
        run: |
          gh pr comment "${{ inputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --body "command executed: ${{ steps.extract_command.outputs.remainder }}"
