on:
  workflow_call:
    inputs:
      chat_command:
        description: The command prefix to look for in the comment
        required: true
        type: string
      comment:
        description: The comment body to check
        required: true
        type: string
      username:
        description: The username who made the comment
        required: true
        type: string
      issue_number:
        description: The issue or PR number to comment on
        required: true
        type: number
    secrets:
      maintainers:
        description: Base64 encoded JSON array of maintainers
        required: true
      token:
        required: true
      app_id:
        required: true
      app_key:
        required: true

jobs:
  chatops:
    runs-on: ubuntu-latest
    steps:
      - name: Check command prefix
        id: check_prefix
        shell: bash
        run: |
          comment="${{ inputs.comment }}"
          command="${{ inputs.chat_command }}"
          if [[ "$comment" == "$command"* ]]; then
            echo "has_command=true" >> "$GITHUB_OUTPUT"
            echo "remainder=${comment#"$command"}" >> "$GITHUB_OUTPUT"
          else
            echo "has_command=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get app token for checkout
        if: steps.check_prefix.outputs.has_command == 'true'
        id: checkout_token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.app_key }}
      - name: Checkout Check Maintainer
        if: steps.check_prefix.outputs.has_command == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: johnsonaj/test-actions
          token: ${{ steps.checkout_token.outputs.token }}
          sparse-checkout: .github/actions/check_maintainer

      - name: Check Maintainer
        if: steps.check_prefix.outputs.has_command == 'true'
        id: check_maintainer
        uses: ./.github/actions/check_maintainer
        with:
          username: ${{ inputs.username }}
          maintainers: ${{ secrets.maintainers }}

      - name: Get app token
        if: steps.check_prefix.outputs.has_command == 'true' && steps.check_maintainer.outputs.is_maintainer == 'true'
        id: app_token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.app_key }}
      - name: Add ci-approved-maintainer label
        if: steps.check_prefix.outputs.has_command == 'true' && steps.check_maintainer.outputs.is_maintainer == 'true'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        shell: bash
        run: |
          gh pr edit "${{ inputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --add-label "ci-approved-maintainer"
      - name: Execute command
        if: steps.check_prefix.outputs.has_command == 'true' && steps.check_maintainer.outputs.is_maintainer == 'true'
        env:
          GH_TOKEN: ${{ secrets.token }}
        shell: bash
        run: |
          gh pr comment "${{ inputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --body "command executed: ${{ steps.check_prefix.outputs.remainder }}"
