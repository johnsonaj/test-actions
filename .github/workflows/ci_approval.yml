name: CI Approval Check

on:
  pull_request_target:
    types:
      - opened
      - labeled

jobs:
  ci_approval:
    if: github.event.action == 'opened'
    uses: ./.github/workflows/reusable_ci_approval.yml
    permissions:
      contents: read
      pull-requests: write
    with:
      user_login: ${{ github.event.pull_request.user.login }}
    secrets:
      : ${{ secrets.CI_APPROVED_USERS }}
      app_id: ${{ secrets.APP_ID }}
      app_key: ${{ secrets.APP_KEY }}

  check_labels:
    if: github.event.action == 'labeled'
    uses: ./.github/workflows/reusable_label_check.yml
    with:
      labels: ${{ format('[{0}]', toJson(github.event.label.name)) }}
    secrets:
      approved_users: ${{ secrets.CI_APPROVED_USERS }}

  start_tc_test:
    needs: check_labels
    if: github.event.action == 'labeled'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment test status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ needs.check_labels.outputs.has_approved_label }}" = "true" ]; then
            comment_id=$(gh api \
              "/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
              --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("Automated testing is pending maintainer approval"))) | .id' \
              | head -1)

            if [ -n "$comment_id" ]; then
              gh api --method PATCH \
                "/repos/${{ github.repository }}/issues/comments/$comment_id" \
                --field body="Test Started"
            else
              gh pr comment "${{ github.event.pull_request.number }}" \
                --repo "${{ github.repository }}" \
                --body "Test Started"
            fi
          else
            gh pr comment "${{ github.event.pull_request.number }}" \
              --repo "${{ github.repository }}" \
              --body "Automated testing is pending maintainer approval"
          fi
