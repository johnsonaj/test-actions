name: CI Approval Check

on:
  pull_request_target:
    types:
      - opened
      - labeled

jobs:
  ci_approval:
    if: github.event.action == 'opened'
    uses: ./.github/workflows/reusable_ci_approval.yml
    permissions:
      contents: read
      pull-requests: write
    with:
      user_login: ${{ github.event.pull_request.user.login }}
    secrets:
      approved_users: ${{ secrets.CI_APPROVED_USERS }}
      app_id: ${{ secrets.APP_ID }}
      app_key: ${{ secrets.APP_KEY }}

  check_labels:
    if: github.event.action == 'labeled'
    uses: ./.github/workflows/reusable_label_check.yml
    with:
      labels: ${{ format('[{0}]', toJson(github.event.label.name)) }}
    secrets:
      approved_users: ${{ secrets.CI_APPROVED_USERS }}

  start_tc_test:
    needs: check_labels
    if: github.event.action == 'labeled'
    uses: ./.github/workflows/reusable_start_tc_test.yml
    permissions:
      pull-requests: write
    with:
      has_approved_label: ${{ needs.check_labels.outputs.has_approved_label }}
      pr_number: ${{ github.event.pull_request.number }}
      repository: ${{ github.repository }}
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
