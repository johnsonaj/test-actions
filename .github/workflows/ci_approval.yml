name: CI Approval Check

permissions:
  contents: read
  issues: write
  pull-requests: write

on:
  pull_request_target:
    types:
      - opened
      - synchronize

jobs:
  ci_approval_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Approval Check
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions/check

      - name: Run Approval Check
        id: approval_check
        uses: ./.github/actions/check
        with:
          user_login: ${{ github.event.pull_request.user.login }}
          maintainers: ${{ secrets.CI_APPROVED_USERS }}

      - name: Add CI Approved Label
        if: steps.ci_approval_check.output.ci_approved_label != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh pr edit ${{ github.event.pull_request.html_url }} --add-label ${{ steps.ci_approval_check.output.ci_approved_label }}
