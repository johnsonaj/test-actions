name: CI Approval Check

on:
  pull_request_target:
    types:
      - opened
      - labeled

jobs:
  ci_approval:
    if: github.event.action == 'opened'
    uses: ./.github/workflows/reusable_ci_approval.yml
    permissions:
      contents: read
      pull-requests: write
    with:
      user_login: ${{ github.event.pull_request.user.login }}
    secrets:
      maintainers: ${{ secrets.CI_APPROVED_USERS }}
      token: ${{ secrets.GITHUB_TOKEN }}

  check_labels:
    if: github.event.action == 'labeled'
    uses: ./.github/workflows/reusable_label_check.yml
    with:
      labels: ${{ format('[{0}]', toJson(github.event.label.name)) }}
    secrets:
      maintainers: ${{ secrets.CI_APPROVED_USERS }}

  start_tc_test:
    needs: check_labels
    if: github.event.action == 'labeled' && needs.check_labels.outputs.has_label == 'true'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment Test Started
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body "Test started."
