on:
  workflow_call:
    inputs:
      has_approved_label:
        required: true
        type: string
      pr_number:
        required: true
        type: string
      repository:
        required: true
        type: string
    secrets:
      token:
        required: true
      app_id:
        required: true
      app_key:
        required: true

jobs:
  start_run:
    runs-on: ubuntu-latest
    steps:
      - name: Start tctest
        shell: bash
        run: | 
          echo "placeholder for starting tctest. TO BE IMPLEMENTED"
          echo "Starting tctest for PR #${{ inputs.pr_number }} in repo ${{ inputs.repository }} with approved label: ${{ inputs.has_approved_label }}"
  comment_status:
    runs-on: ubuntu-latest
    needs: start_run
    permissions:
      pull-requests: write
    steps:
      - name: Find existing pending approval comment
        id: find_comment
        uses: peter-evans/find-comment@3eae4d37986fb5a8592848f6a574fdf654e61f9e # v3
        with:
          token: ${{ secrets.token }}
          repository: ${{ inputs.repository }}
          issue-number: ${{ inputs.pr_number }}
          comment-author: github-actions[bot]
          body-includes: "Automated testing is pending maintainer approval"
      - name: Update existing comment when approved
        if: inputs.has_approved_label == 'true' && steps.find_comment.outputs.comment-id != ''
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4
        with:
          token: ${{ secrets.token }}
          repository: ${{ inputs.repository }}
          comment-id: ${{ steps.find_comment.outputs.comment-id }}
          body: "Your PR has been reviewed by a maintainer and approved for automated testing"
          edit-mode: replace
      - name: Create new comment when approved
        if: inputs.has_approved_label == 'true' && steps.find_comment.outputs.comment-id == ''
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4
        with:
          token: ${{ secrets.token }}
          repository: ${{ inputs.repository }}
          issue-number: ${{ inputs.pr_number }}
          body: "Test Started"
      - name: Comment pending approval
        if: inputs.has_approved_label != 'true'
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4
        with:
          token: ${{ secrets.token }}
          repository: ${{ inputs.repository }}
          issue-number: ${{ inputs.pr_number }}
          body: "Automated testing is pending maintainer approval"
