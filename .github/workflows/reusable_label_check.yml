on:
  workflow_call:
    inputs:
      labels:
        required: true
        type: string
    secrets:
      maintainers:
        required: true
    outputs:
      has_label:
        description: Whether label is present
        value: ${{ jobs.label_check.outputs.has_label }}

jobs:
  label_check:
    runs-on: ubuntu-latest
    outputs:
      has_label: ${{ steps.label_check.outputs.check }}
    steps:
      - name: Check Labels
        id: label_check
        shell: bash
        env:
          LABELS_JSON: ${{ inputs.labels }}
          MAINTAINERS_B64: ${{ secrets.maintainers }}
        run: |
          MAINTAINERS_JSON="$(echo "$MAINTAINERS_B64" | base64 --decode)"
          echo "check=$(jq -n --argjson maintainers "$MAINTAINERS_JSON" --argjson labels "$LABELS_JSON" -r 'any($labels[]; . as $label | ($maintainers | keys | index($label)) != null)')" >> "$GITHUB_OUTPUT"
