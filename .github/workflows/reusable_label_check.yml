on:
  workflow_call:
    inputs:
      labels:
        required: true
        type: string
      user_login:
        description: Username to check against the maintainers list
        required: true
        type: string
      pr_number:
        description: Pull request number
        required: true
        type: number
      label_bot:
        description: If set, this login is treated as a maintainer
        required: false
        type: string
    secrets:
      approved_users:
        required: true
      token:
        required: true
      maintainers:
        description: Base64 encoded JSON array of maintainers
        required: true
      app_id:
        required: true
      app_key:
        required: true
    outputs:
      has_approved_label:
        description: Whether label is present
        value: ${{ jobs.set_label.result == 'success' && 'false' || jobs.label_check.outputs.has_label }}
      is_maintainer:
        description: Whether the username is in the maintainers list
        value: ${{ jobs.check_maintainers.outputs.is_maintainer }}

jobs:
  label_check:
    runs-on: ubuntu-latest
    outputs:
      has_label: ${{ steps.label_check.outputs.check }}
    steps:
      - name: Check Labels
        id: label_check
        shell: bash
        env:
          LABELS_JSON: ${{ inputs.labels }}
          APPROVED_USERS_B64: ${{ secrets.approved_users }}
        run: |
          APPROVED_USERS_JSON="$(echo "$APPROVED_USERS_B64" | base64 --decode)"
          echo "check=$(jq -n --argjson approved_users "$APPROVED_USERS_JSON" --argjson labels "$LABELS_JSON" -r 'any($labels[]; . as $label | ($approved_users | keys | index($label)) != null)')" >> "$GITHUB_OUTPUT"

  check_maintainers:
    needs: label_check
    if: needs.label_check.outputs.has_label == 'true'
    runs-on: ubuntu-latest
    outputs:
      is_maintainer: ${{ steps.resolve.outputs.is_maintainer }}
    steps:
      - name: Get app token
        id: app_token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.app_key }}
      - name: Checkout Check Maintainer
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app_token.outputs.token }}
          sparse-checkout: johnsonaj/test-actions/.github/actions/check_maintainer@main
      - name: Check Maintainers
        id: check_maintainers
        uses: ./.github/actions/check_maintainer
        with:
          username: ${{ inputs.user_login }}
          maintainers: ${{ secrets.maintainers }}
      - name: Resolve is_maintainer
        id: resolve
        shell: bash
        run: |
          if [ "${{ inputs.label_bot }}" != "" ] && [ "${{ inputs.user_login }}" = "${{ inputs.label_bot }}" ]; then
            echo "is_maintainer=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_maintainer=${{ steps.check_maintainers.outputs.is_maintainer }}" >> "$GITHUB_OUTPUT"
          fi

  set_label:
    needs: [label_check, check_maintainers]
    if: needs.check_maintainers.outputs.is_maintainer == 'false' && needs.label_check.outputs.has_label == 'true'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Remove label
        env:
          GH_TOKEN: ${{ secrets.token }}
          LABELS_JSON: ${{ inputs.labels }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          label=$(echo "$LABELS_JSON" | jq -r '.[0]')
          gh pr edit "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --remove-label "$label"
      - name: Add ci-needs-maintainer-review label
        env:
          GH_TOKEN: ${{ secrets.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          existing=$(gh pr view "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --json labels \
            --jq '[.labels[].name] | any(. == "ci-needs-maintainer-review")')
          if [ "$existing" != "true" ]; then
            gh pr edit "$PR_NUMBER" \
              --repo "${{ github.repository }}" \
              --add-label "ci-needs-maintainer-review"
          fi
