on:
  workflow_call:
    inputs:
      user_login:
        required: true
        type: string
      approved_label_maintainer:
        description: Label to apply when the user is an approved maintainer
        required: true
        type: string
      approved_label_other:
        description: Label to apply when the user is approved but not a maintainer
        required: false
        type: string
      team_name:
        description: GitHub team slug to fetch maintainers from
        required: true
        type: string
    secrets:
      approved_users:
        required: true
      app_id:
        required: true
      app_key:
        required: true

jobs:
  ci_approval_check:
    runs-on: ubuntu-latest
    outputs:
      ci_approved_label: ${{ steps.approval_check.outputs.ci_approved_label }}
    steps:
      - name: Get app token
        id: app_token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.app_key }}

      - name: Get team members
        id: team_members
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          members=$(gh api \
            --paginate \
            "/orgs/${{ github.repository_owner }}/teams/${{ inputs.team_name }}/members" \
            --jq '[.[].login]' | jq -cs 'add // []')
          echo "members=${members}" >> "$GITHUB_OUTPUT"

      - name: Checkout Approval Check
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: johnsonaj/test-actions
          token: ${{ steps.app_token.outputs.token }}
          sparse-checkout: ./.github/actions/check

      - name: Approval Check
        id: approval_check
        uses: ./.github/actions/check
        with:
          user_login: ${{ inputs.user_login }}
          approved_users: ${{ secrets.approved_users }}
          maintainers: ${{ steps.team_members.outputs.members }}
          approved_label_maintainer: ${{ inputs.approved_label_maintainer }}
          approved_label_other: ${{ inputs.approved_label_other }}

  label_pr:
    runs-on: ubuntu-latest
    needs: ci_approval_check
    steps:
      - name: Get app token
        id: app_token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.app_key }}

      - name: Label PR
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          new_label="${{ needs.ci_approval_check.outputs.ci_approved_label }}"
          if [ -z "$new_label" ]; then
            new_label="ci-needs-maintainer-review"
          fi

          PR_URL="${{ github.event.pull_request.html_url }}"
          current_labels=$(gh pr view "$PR_URL" --json labels --jq '[.labels[].name]')

          for label in "${{ inputs.approved_label_maintainer }}" "${{ inputs.approved_label_other }}"; do
            if [ -n "$label" ] && [ "$label" != "$new_label" ]; then
              if echo "$current_labels" | jq -e --arg l "$label" 'contains([$l])' > /dev/null; then
                gh pr edit "$PR_URL" --remove-label "$label"
              fi
            fi
          done

          if echo "$current_labels" | jq -e --arg l "$new_label" 'contains([$l])' > /dev/null; then
            gh pr edit "$PR_URL" --remove-label "$new_label"
          fi
          gh pr edit "$PR_URL" --add-label "$new_label"
