on:
  workflow_call:
    inputs:
      user_login:
        required: true
        type: string
    secrets:
      maintainers:
        required: true

jobs:
  ci_approval_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app_token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_KEY }}
      - name: Checkout Approval Check
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions/check

      - name: Approval Check
        id: approval_check
        uses: ./.github/actions/check
        with:
          user_login: ${{ inputs.user_login }}
          maintainers: ${{ secrets.maintainers }}

      - name: Label PR if Approved
        if: steps.approval_check.outputs.ci_approved_label != ''
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          gh pr edit ${{ github.event.pull_request.html_url }} --add-label ${{ steps.approval_check.outputs.ci_approved_label }}
