on:
  workflow_call:
    inputs:
      user_login:
        required: true
        type: string
      approved_label_maintainer:
        description: Label to apply when the user is an approved maintainer
        required: false
        type: string
      approved_label_other:
        description: Label to apply when the user is approved but not a maintainer
        required: false
        type: string
      team_name:
        description: GitHub team slug to fetch maintainers from
        required: true
        type: string
    secrets:
      approved_users:
        required: true
      app_id:
        required: true
      app_key:
        required: true

jobs:
  ci_approval_check:
    runs-on: ubuntu-latest
    steps:
      - name: Get app token
        id: app_token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.app_key }}

      - name: Get team members
        id: team_members
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          members=$(gh api \
            --paginate \
            "/orgs/${{ github.repository_owner }}/teams/${{ inputs.team_name }}/members" \
            --jq '[.[].login]' | jq -cs 'add // []')
          echo "members=${members}" >> "$GITHUB_OUTPUT"

      - name: Checkout Approval Check
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: johnsonaj/test-actions
          token: ${{ steps.app_token.outputs.token }}
          sparse-checkout: ./.github/actions/check

      - name: Approval Check
        id: approval_check
        uses: ./.github/actions/check
        with:
          user_login: ${{ inputs.user_login }}
          approved_users: ${{ secrets.approved_users }}
          maintainers: ${{ steps.team_members.outputs.members }}
          approved_label_maintainer: ${{ inputs.approved_label_maintainer }}
          approved_label_other: ${{ inputs.approved_label_other }}

      - name: Label PR if Approved
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          label="${{ steps.approval_check.outputs.ci_approved_label }}"
          if [ -z "$label" ]; then
            label="ci-needs-maintainer-review"
          fi
          gh pr edit ${{ github.event.pull_request.html_url }} --add-label "$label"
